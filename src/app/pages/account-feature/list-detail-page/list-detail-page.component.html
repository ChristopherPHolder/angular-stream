<article>
  <header>
    <h1>{{ listName() }}</h1>
    <h2>TMDB</h2>
    <a class="btn primary-button" [routerLink]="['../../../account/my-lists']">
      <fast-svg name="back" size="1em"></fast-svg>&nbsp; Back
    </a>
  </header>
  <div class="tabs">
    @for (item of tabs; track item.link) {
      <a class="tab" [routerLink]="item.link" routerLinkActive="active">{{
        item.name
      }}</a>
    }
  </div>
  <router-outlet></router-outlet>
</article>
