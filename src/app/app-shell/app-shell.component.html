<ui-side-drawer
  [opened]="sideDrawerOpen()"
  (openedChange)="ui.sideDrawerOpenToggle(false)"
>
  <a class="navigation-header" aria-label="Main page" href="/">
    <fast-svg name="movies-logo" size="150" />
  </a>
  <nav class="navigation">
    <h3 class="navigation--headline">Discover</h3>
    <a
      aria-label="Popular"
      data-uf="menu-cat-popular"
      class="navigation--link"
      [routerLink]="['/list', 'category', 'popular']"
      routerLinkActive="active"
    >
      <div class="navigation--menu-item">
        <fast-svg class="navigation--menu-item-icon" name="popular" />
        Popular
      </div>
    </a>
    <a
      data-uf="menu-cat-topRated"
      class="navigation--link"
      [routerLink]="['/list', 'category', 'top_rated']"
      routerLinkActive="active"
    >
      <div class="navigation--menu-item">
        <fast-svg
          class="navigation--menu-item-icon"
          name="top_rated"
        ></fast-svg>
        Top Rated
      </div>
    </a>
    <a
      data-uf="menu-cat-upcoming"
      class="navigation--link"
      [routerLink]="['/list', 'category', 'upcoming']"
      routerLinkActive="active"
    >
      <div class="navigation--menu-item">
        <fast-svg
          class="navigation--menu-item-icon"
          name="upcoming"
        ></fast-svg>
        Upcoming
      </div>
    </a>
    <h3 class="navigation--headline">Genres</h3>
    @for (genre of genres(); track trackByGenre($index, genre)) {
      <a
        [attr.data-uf]="'menu-gen-' + genre.id"
        class="navigation--link"
        [routerLink]="['/list', 'genre', genre.id]"
        routerLinkActive="active"
      >
        <div class="navigation--menu-item">
          <fast-svg class="navigation--menu-item-icon" name="genre"></fast-svg>
          {{ genre.name }}
        </div>
      </a>
    }
  </nav>
  <div class="menu-footer">
    <a
      aria-label="The movie DB website"
      href="https://www.themoviedb.org/"
      target="_blank"
      rel="noreferrer noopener"
    >
      <fast-svg name="tmdb-logo" width="75" height="30"></fast-svg>
    </a>
  </div>
</ui-side-drawer>
<div class="content-wrapper">
  <div class="ui-toolbar">
    <ui-hamburger-button
      data-uf="menu-btn"
      class="ui-toolbar--action"
      (click)="ui.sideDrawerOpenToggle(!sideDrawerOpen())"
    >
    </ui-hamburger-button>
    <div class="ui-toolbar--widget-container">
      <ui-search-bar
        [query]="search$"
        (searchSubmit)="searchMovie($event)"
      ></ui-search-bar>
      <ui-dark-mode-toggle></ui-dark-mode-toggle>
      <div class="account-menu-dropdown">
        <button
          data-uf="profile-menu-button"
          type="button"
          aria-label="Toggle profile menu"
          name="profile"
          class="profile-button"
          (mouseenter)="ui.loadAccountMenu()"
        >
          <div class="focus-overlay"></div>
          <fast-svg name="account" />
        </button>
        <div class="profile-menu-content" data-uf="profile-menu-content">
          @if (accountMenuComponent(); as accountMenuComponent) {
            <ng-container [lazy]="accountMenuComponent"></ng-container>
          } @else {
            Loading...
          }
        </div>
      </div>
    </div>
  </div>
  <div class="content">
    <ng-content />
  </div>
</div>
